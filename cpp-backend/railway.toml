# Railway 部署配置
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.railway"

[deploy]
startCommand = "./build/chat_server"
# Railway 的健康检查使用 HTTP，但我们的服务是纯 WebSocket
# 暂时禁用健康检查，或者需要修改后端支持 HTTP 健康检查端点
# healthcheckPath = "/"
# healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
